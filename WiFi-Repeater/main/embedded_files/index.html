<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ESP32 WiFi Repeater</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
        <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1"/>
      </svg>
      <h1>WiFi Repeater</h1>
    </div>
    <div class="status-dot" id="statusDot" title="Disconnected"></div>
  </header>

  <nav>
    <button class="tab active" data-tab="dashboard">Dashboard</button>
    <button class="tab" data-tab="config">Config</button>
    <button class="tab" data-tab="clients">Clients</button>
  </nav>

  <!-- Dashboard -->
  <section id="dashboard" class="panel active">
    <div class="cards">
      <div class="card">
        <div class="card-icon sta-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
            <circle cx="12" cy="20" r="1"/>
          </svg>
        </div>
        <div class="card-content">
          <span class="card-label">Upstream</span>
          <span class="card-value" id="staSSID">--</span>
          <span class="card-sub" id="staIP">--</span>
        </div>
      </div>
      <div class="card">
        <div class="card-icon rssi-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="1" y="16" width="4" height="6"/>
            <rect x="7" y="12" width="4" height="10"/>
            <rect x="13" y="6" width="4" height="16"/>
            <rect x="19" y="1" width="4" height="21"/>
          </svg>
        </div>
        <div class="card-content">
          <span class="card-label">Signal</span>
          <span class="card-value" id="staRSSI">-- dBm</span>
          <div class="rssi-bar"><div class="rssi-fill" id="rssiFill"></div></div>
        </div>
      </div>
      <div class="card">
        <div class="card-icon clients-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div class="card-content">
          <span class="card-label">AP Clients</span>
          <span class="card-value" id="apClients">0</span>
          <span class="card-sub" id="apIP">192.168.4.1</span>
        </div>
      </div>
      <div class="card">
        <div class="card-icon sys-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </div>
        <div class="card-content">
          <span class="card-label">System</span>
          <span class="card-value" id="freeHeap">-- KB</span>
          <span class="card-sub" id="uptime">Uptime: --</span>
        </div>
      </div>
    </div>

    <div class="ping-section">
      <h3>Connectivity Test</h3>
      <div class="ping-row">
        <input type="text" id="pingTarget" placeholder="8.8.8.8 or google.com" value="8.8.8.8" autocomplete="off">
        <button id="btnPing" class="btn btn-secondary btn-sm" onclick="doPing()">Ping</button>
      </div>
      <div id="pingResult" class="ping-result"></div>
    </div>
  </section>

  <!-- Config -->
  <section id="config" class="panel">
    <div class="config-section">
      <h2>
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <circle cx="12" cy="20" r="1"/>
        </svg>
        Upstream Network (STA)
      </h2>
      <div class="scan-row">
        <button id="btnScan" class="btn btn-secondary" onclick="doScan()">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          Scan Networks
        </button>
      </div>
      <div id="scanResults" class="scan-list" style="display:none"></div>
      <div class="form-group">
        <label for="staSSIDInput">SSID</label>
        <input type="text" id="staSSIDInput" placeholder="Network name" maxlength="32" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="staPassInput">Password</label>
        <div class="pass-wrap">
          <input type="password" id="staPassInput" placeholder="Network password" maxlength="64" autocomplete="off">
          <button class="btn-eye" onclick="togglePass('staPassInput')">👁</button>
        </div>
      </div>
    </div>

    <div class="config-section">
      <h2>
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
          <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <circle cx="12" cy="20" r="1"/>
        </svg>
        Access Point (AP)
      </h2>
      <div class="form-group">
        <label for="apSSIDInput">AP SSID</label>
        <input type="text" id="apSSIDInput" placeholder="Repeater name" maxlength="32" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="apPassInput">AP Password</label>
        <div class="pass-wrap">
          <input type="password" id="apPassInput" placeholder="Min 8 characters" maxlength="64" autocomplete="off">
          <button class="btn-eye" onclick="togglePass('apPassInput')">👁</button>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group half">
          <label for="apChannel">Channel</label>
          <select id="apChannel">
            <option value="0">Auto</option>
            <option value="1">1</option><option value="2">2</option><option value="3">3</option>
            <option value="4">4</option><option value="5">5</option><option value="6">6</option>
            <option value="7">7</option><option value="8">8</option><option value="9">9</option>
            <option value="10">10</option><option value="11">11</option>
            <option value="12">12</option><option value="13">13</option>
          </select>
        </div>
        <div class="form-group half">
          <label for="apMaxConn">Max Clients</label>
          <select id="apMaxConn">
            <option value="1">1</option><option value="2">2</option>
            <option value="3">3</option><option value="4" selected>4</option>
            <option value="5">5</option><option value="6">6</option>
            <option value="7">7</option><option value="8">8</option>
            <option value="9">9</option><option value="10">10</option>
          </select>
        </div>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="saveConfig()">Save &amp; Apply</button>
      <button class="btn btn-danger" onclick="restartDevice()">Restart</button>
    </div>
  </section>

  <!-- Clients -->
  <section id="clients" class="panel">
    <div class="section-header">
      <h2>Connected Clients</h2>
      <button class="btn btn-secondary btn-sm" onclick="loadClients()">Refresh</button>
    </div>
    <div id="clientList" class="client-list">
      <div class="empty-state">No clients connected</div>
    </div>
  </section>

  <div id="toast" class="toast"></div>
</div>
<script src="/app.js"></script>
</body>
</html>
