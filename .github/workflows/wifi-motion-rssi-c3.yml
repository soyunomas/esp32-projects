name: WiFi Motion RSSI C3

on:
  push:
    paths:
      - "WiFi-Motion-RSSI-C3-Supermini/**"
      - ".github/workflows/wifi-motion-rssi-c3.yml"
  pull_request:
    paths:
      - "WiFi-Motion-RSSI-C3-Supermini/**"
      - ".github/workflows/wifi-motion-rssi-c3.yml"

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S WiFi-Motion-RSSI-C3-Supermini/tests/host -B build-host
      - name: Build
        run: cmake --build build-host --parallel
      - name: Test
        run: ctest --test-dir build-host --output-on-failure

  firmware-build:
    runs-on: ubuntu-latest
    container: espressif/idf:v6.0.2
    steps:
      - uses: actions/checkout@v4
      - name: Build ESP32-C3 firmware
        shell: bash
        working-directory: WiFi-Motion-RSSI-C3-Supermini
        run: |
          . "$IDF_PATH/export.sh"
          idf.py set-target esp32c3
          idf.py -D SDKCONFIG_DEFAULTS=sdkconfig.defaults build
